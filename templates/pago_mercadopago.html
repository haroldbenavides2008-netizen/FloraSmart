{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">💳 Procesando Pago</h5>
                </div>
                <div class="card-body text-center py-5">
                    <div class="spinner-border text-success mb-3" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <h6>Se está redirigiendo a Mercado Pago para completar tu pago...</h6>
                    <p class="text-muted small mt-3">Por favor, no cierres esta ventana</p>
                    
                    <div class="alert alert-info mt-4">
                        <strong>Referencia del pago:</strong> <code>{{ reference }}</code>
                    </div>

                    <p class="text-muted mt-4">
                        <small>¿Problemas con el pago? 
                            <a href="{% url 'mis_pedidos' %}">Volver a Mis Pedidos</a>
                        </small>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Esta página se muestra brevemente antes de redirigir a Mercado Pago
    // Si no se redirige automáticamente, el usuario puede hacer clic en el enlace de arriba
</script>
{% endblock %}

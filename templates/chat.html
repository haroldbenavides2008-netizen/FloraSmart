{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    .chat-container {
        max-width: 800px;
        margin: 20px auto;
        height: 70vh;
        display: flex;
        flex-direction: column;
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    .chat-header {
        background: #2e7d32; /* Verde FloraSmart */
        color: white;
        padding: 15px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
    }
    #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background-color: #f0f2f5;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .message {
        max-width: 70%;
        padding: 10px 15px;
        border-radius: 15px;
        font-size: 0.95rem;
        position: relative;
    }
    .message.sent {
        align-self: flex-end;
        background-color: #dcf8c6;
        color: #303030;
        border-bottom-right-radius: 2px;
    }
    .message.received {
        align-self: flex-start;
        background-color: white;
        color: #303030;
        border-bottom-left-radius: 2px;
    }
    .message-info {
        font-size: 0.7rem;
        display: block;
        margin-top: 5px;
        opacity: 0.7;
    }
    .chat-input-area {
        padding: 15px;
        background: white;
        border-top: 1px solid #eee;
        display: flex;
        gap: 10px;
    }
</style>
{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">🌸</div>
        <div>
            <h5 class="mb-0">{{ receptor.username }}</h5>
            <small>En línea (FloraSmart Connect)</small>
        </div>
    </div>

    <div id="chat-messages">
        <!-- Los mensajes cargarán aquí dinámicamente -->
    </div>

    <div class="chat-input-area">
        <input type="text" id="msg-input" class="form-control border-0 bg-light" placeholder="Escribe un mensaje para {{ receptor.username }}...">
        <button id="btn-send" class="btn btn-success px-4 rounded-pill">
            Enviar
        </button>
    </div>
</div>

<!-- Configuración de Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 1. Configuración de tu proyecto (Copia esto de tu consola de Firebase)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "tu-proyecto.firebaseapp.com",
        databaseURL: "https://tu-proyecto-default-rtdb.firebaseio.com",
        projectId: "tu-proyecto",
        storageBucket: "tu-proyecto.appspot.com",
        messagingSenderId: "..."
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const salaId = "{{ sala_id }}";
    const myId = "{{ request.user.id }}";
    const chatRef = database.ref('chats/' + salaId);

    // 2. Función para Enviar Mensaje
    document.getElementById('btn-send').onclick = function() {
        const text = document.getElementById('msg-input').value;
        if (text.trim() === "") return;

        chatRef.push({
            sender_id: myId,
            text: text,
            timestamp: Date.now()
        });

        document.getElementById('msg-input').value = "";
    };

    // 3. Escuchar Mensajes en Tiempo Real
    chatRef.on('child_added', (snapshot) => {
        const data = snapshot.val();
        const chatBox = document.getElementById('chat-messages');
        const isMe = data.sender_id == myId;

        const messageHtml = `
            <div class="message ${isMe ? 'sent' : 'received'} shadow-sm">
                ${data.text}
                <span class="message-info">${new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            </div>
        `;

        chatBox.innerHTML += messageHtml;
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll al final
    });
</script>
{% endblock %}
